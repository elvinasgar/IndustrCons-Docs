<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Excel Mühəndislik Alətləri — IndustrCons Docs</title>
<meta name="description" content="Beton sərfiyyatı, polad çəki, material izləmə, BOQ, ödəniş sertifikatı və digər hazır Excel şablonları." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div data-include="header.html"></div>

<section style="padding-top:var(--sp-8);padding-bottom:var(--sp-4);">
  <div class="container">
    <span class="section-eyebrow">Excel Alətləri</span>
    <h1 style="font-size:2.25rem;">Mühəndislik Excel Şablonları</h1>
    <p style="max-width:600px;">Material izləmə, xərc nəzarəti, BOQ və ödəniş sertifikatları üçün formullu Excel cədvəlləri.</p>
  </div>
</section>

<section style="padding-top:0;">
  <div class="container">
    <div class="grid grid-3" data-excel-grid></div>
  </div>
</section>

<div data-include="footer.html"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import "./include.js";
import "./app.js";
import { initExcelTools } from "./excel-generator.js";
document.addEventListener("partials:loaded", () => initExcelTools("[data-excel-grid]"));
</script>
</body>
</html>
