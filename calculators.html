<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mühəndis Kalkulyatorları — IndustrCons Docs</title>
<meta name="description" content="Beton, armatur, torpaq işləri, konstruksiya və material kalkulyatorları. Dəqiq mühəndis düsturları ilə." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div data-include="header.html"></div>

<section style="padding-top:var(--sp-8);padding-bottom:var(--sp-4);">
  <div class="container">
    <span class="section-eyebrow">Mühəndis Alətləri</span>
    <h1 style="font-size:2.25rem;">Kalkulyatorlar</h1>
    <p style="max-width:600px;">Beton, armatur, material və torpaq işləri hesablamalarını dəqiq mühəndis düsturları ilə aparın.</p>
  </div>
</section>

<section style="padding-top:0;">
  <div class="container">
    <div class="grid grid-3" data-calc-grid></div>
  </div>
</section>

<div data-include="footer.html"></div>

<script type="module">
import "./include.js";
import "./app.js";
import { initCalculatorsGrid } from "./calculators.js";
document.addEventListener("partials:loaded", () => initCalculatorsGrid("[data-calc-grid]"));
</script>
</body>
</html>
