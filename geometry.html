<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Həndəsi Alətlər — IndustrCons Docs</title>
<meta name="description" content="Üçbucaq, dairə, silindr, konus, kürə, I-profil və digər həndəsi fiqurların sahə/həcm hesablamaları." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div data-include="header.html"></div>

<section style="padding-top:var(--sp-8);padding-bottom:var(--sp-4);">

</section>

<section style="padding-top:0;">
  <div class="container">
    <div class="grid grid-3" data-geo-grid></div>

<div data-include="footer.html"></div>

<script type="module">

import "./app.js";
import { initGeometryGrid } from "./calculators.js";
document.addEventListener("partials:loaded", () => initGeometryGrid("[data-geo-grid]"));
